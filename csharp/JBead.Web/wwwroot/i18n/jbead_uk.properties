# Images section note
print.images.note = Візерунок = плоский вигляд чернетки. Симуляція = передня половина бісерного джгута з цегляним зміщенням. Плитки поділяють ряд і зменшуються для припасування; використовуйте регулятор висоти зображення вище, щоб змінити їхню максимальну висоту.

# Threading order summary (HTML allowed)
