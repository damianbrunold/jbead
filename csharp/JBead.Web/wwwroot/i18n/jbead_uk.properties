infoaboutdialog.title = Про jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  Це <b>jbead</b>, програма, розроблена для допомоги у проєктуванні<br>\
  бісерних джгутів. Створення таких джгутів описано,<br>\
  наприклад, у книзі 'Bead Crochet Jewelry' авторів Берт<br>\
  Рейчел Фрід і Дани Елізабет Фрід. Виготовлення такого джгута —<br>\
  це важка праця, проте результат дуже гарний.<br>\
  <br>\
  За допомогою <b>jbead</b> ви можете побачити, як виглядатиме ваш<br>\
  проєкт, перш ніж почати роботу над ним. Ви можете вдосконалити<br>\
  свій проєкт, а наприкінці роздрукувати всі необхідні дані,<br>\
  включно з важливим 'списком намистин', який вказує,<br>\
  як правильно нанизати намистини на нитку.<br>\
  <br>\
  <b>jbead</b> написав Даміан Брунольд. Програма є вільно<br>\
  доступною та ліцензованою за умовами GPL v3. Це означає,<br>\
  що ви можете вільно її використовувати, копіювати та<br>\
  створювати похідні твори. Даміан Брунольд не несе<br>\
  відповідальності за помилки та шкоду, спричинену<br>\
  використанням програми. Ви маєте самі вирішити,<br>\
  чи корисна для вас ця програма.<br>\
  <br> \
  Більше інформації доступно на www.jbead.ch, де ви також<br>\
  можете залишити пропозиції щодо функцій та звіти про помилки.<br>\
  <br>\
  Приємного користування <b>jbead</b>!<br>

