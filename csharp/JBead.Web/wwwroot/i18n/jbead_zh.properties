infoaboutdialog.title = 关于 jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  这是 <b>jbead</b>,一个旨在帮助您设计<br>\
  串珠钩编绳的程序。这种绳子的制作方法<br>\
  可以在诸如 Bert Rachel Freed 和 Dana<br>\
  Elizabeth Freed 所著的《Bead Crochet Jewelry》<br>\
  这本书中找到。制作这样的绳子是一项艰苦的工作,<br>\
  但成果非常精美。<br>\
  <br>\
  使用 <b>jbead</b>,您可以在开始制作之前<br>\
  模拟您的设计效果。您可以调整您的设计,<br>\
  最后打印出所有相关数据,包括必不可少的<br>\
  "珠子列表",它会告诉您如何将珠子正确地<br>\
  排列在线上。<br>\
  <br>\
  <b>jbead</b> 由 Damian Brunold 编写。它是<br>\
  免费提供的,并根据 GPL v3 许可证授权。这意味着<br>\
  您可以自由使用和复制它,并且可以创建衍生作品。<br>\
  Damian Brunold 不对因使用本程序而造成的错误<br>\
  和损害承担任何责任。您必须自己决定本程序<br>\
  对您是否有用。<br>\
  <br> \
  更多信息可以在 www.jbead.ch 获得,您也可以<br>\
  在那里提交功能请求和错误报告。<br>\
  <br>\
  祝您使用 <b>jbead</b> 愉快!<br>

