print.images.note = Vzor = plochý návrhový pohled. Simulace = přední polovina korálkového lana s cihlovým posunem. Dlaždice sdílejí řádek a zmenšují se podle potřeby; použijte ovládání výšky obrázku výše pro změnu maximální výšky.

