infoaboutdialog.title = O programu jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  Toto je <b>jbead</b>, program navržený pro pomoc při tvorbě<br>\
  háčkovaných korálkových šňůr. Tvorba takových šňůr je popsána<br>\
  například v knize 'Bead Crochet Jewelry' od Bert Rachel Freed<br>\
  a Dany Elizabeth Freed. Vytvořit takovou šňůru je tvrdá práce,<br>\
  ale výsledek je velmi krásný.<br>\
  <br>\
  S <b>jbead</b> si můžete nasimulovat, jak bude váš návrh vypadat,<br>\
  než začnete pracovat. Můžete svůj návrh upravovat a nakonec<br>\
  vytisknout všechna podstatná data včetně nezbytného<br>\
  'seznamu korálků', který vám řekne, jak správně navléknout<br>\
  korálky na nit.<br>\
  <br>\
  <b>jbead</b> napsal Damian Brunold. Je volně dostupný pod<br>\
  licencí GPL v3. To znamená, že jej můžete volně používat<br>\
  a kopírovat a můžete vytvářet odvozená díla. Damian Brunold<br>\
  nemůže převzít odpovědnost za chyby a škody způsobené<br>\
  používáním programu. Sami se musíte rozhodnout, zda je<br>\
  program pro vás užitečný, nebo ne.<br>\
  <br> \
  Více informací je k dispozici na www.jbead.ch, kde také<br>\
  můžete nahlásit požadavky na funkce a chyby.<br>\
  <br>\
  Užijte si <b>jbead</b>!<br>

