print.about.pattern = <strong>Vzor</strong> shrnuje návrh: obvod (korálky na řádek), počet použitých řádků, jeden cyklus opakování barev a celkový počet korálků potřebných pro celý vzor \u2014 <em>včetně</em> pozadí.
print.about.patternimage = <strong>Obrázek vzoru</strong> je škálovatelné vykreslení návrhu; použijte výběr velikosti pro odpovídající formát papíru.
print.about.beads = <strong>Korálky k navléknutí</strong> je váš nákupní/přípravný seznam: kolik korálků každého druhu si máte připravit. Každý řádek ukazuje barvu, výrobce, název/ID a povrch.
print.about.threading = <strong>Pořadí navlékání</strong> je přesná posloupnost navlékání korálků (<code>12\u00d7</code> znamená "navléknout 12 těchto korálků v řadě"). Pokud je sekvence periodická, stránka zobrazí <em>kompaktní</em> formu \u2014 základní blok plus počet opakování \u2014 místo celého seznamu. Přepínačem přepínejte mezi kompaktním a úplným. Sloupce rozdělí dlouhé seznamy na šířku stránky.
print.about.print = Klikněte na <strong>Tisk\u2026</strong> pro odeslání tohoto reportu na tiskárnu. Barvy jsou v tisku zachovány.
