infoaboutdialog.title = jbead について
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  これは <b>jbead</b> です。ビーズクロシェロープ<br>\
  のデザインを支援するプログラムです。このような<br>\
  ロープの作り方は、例えば Bert Rachel Freed と<br>\
  Dana Elizabeth Freed による 'Bead Crochet Jewelry'<br>\
  という本に記載されています。このようなロープを<br>\
  作るのは大変な作業ですが、結果はとても美しいものです。<br>\
  <br>\
  <b>jbead</b> を使えば、作業を始める前にデザインが<br>\
  どのように見えるかをシミュレートできます。デザインを<br>\
  微調整し、最終的にすべての関連データを印刷できます。<br>\
  これには、糸にビーズを正しく配置する方法を示す<br>\
  重要な「ビーズのリスト」も含まれます。<br>\
  <br>\
  <b>jbead</b> は Damian Brunold によって書かれました。<br>\
  GPL v3 の下で自由に利用できます。これは自由に使用・<br>\
  コピーでき、派生作品を作成できることを意味します。<br>\
  Damian Brunold はプログラムの使用によって引き起こされる<br>\
  バグや損害についての責任を負いません。プログラムが<br>\
  あなたにとって有用かどうかはあなた自身で判断してください。<br>\
  <br> \
  詳細は www.jbead.ch で入手でき、そこで機能要望や<br>\
  バグ報告を送ることもできます。<br>\
  <br>\
  <b>jbead</b> をお楽しみください!<br>

