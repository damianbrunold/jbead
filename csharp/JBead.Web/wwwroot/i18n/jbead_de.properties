print.images.note = Muster = Entwurfsansicht. Simulation = Vorderseite der Perlenkette mit dem Ziegelstich-Versatz. Die Bilder teilen sich eine Zeile und schrumpfen passend; verwenden Sie die Bildhöhensteuerung oben, um die maximale Höhe zu ändern.

print.numbers.hint = Zahlen in der <strong>#</strong>-Spalte werden von der <em>Fädelreihenfolge</em> unten referenziert \u2014 z.B. <code>12\u00d7 #3</code> bedeutet 12 Perlen des Typs aus Zeile #3 auffädeln.

