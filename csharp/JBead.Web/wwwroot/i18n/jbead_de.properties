print.runs.summary = Jeder Eintrag ist eine Folge identischer Perlen, die der Reihe nach aufzufädeln sind \u2014 Hintergrund-Runs sind enthalten. Zahlen beziehen sich auf die Perlentabelle oben. {0} Runs, {1} Perlen insgesamt.
print.runs.repeats.info = (Muster wiederholt sich alle {0} {1}{2}.)

print.about.pattern = <strong>Muster</strong> fasst den Entwurf zusammen: Umfang (Perlen pro Zeile), Anzahl der verwendeten Zeilen, ein Farbwiederholungszyklus und die Gesamtzahl der Perlen, die Sie für das ganze Muster benötigen \u2014 <em>einschließlich</em> des Hintergrunds.
print.about.patternimage = <strong>Musterbild</strong> ist eine skalierbare Darstellung des Entwurfs; verwenden Sie die Größenauswahl, um das gewünschte Papierformat anzupassen.
print.about.beads = <strong>Perlen zum Auffädeln</strong> ist Ihre Einkaufs-/Vorbereitungsliste: wie viele von jeder unterschiedlichen Perle Sie vorbereiten müssen. Jede Zeile zeigt Farbe, Hersteller, Name/ID und Finish.
print.about.threading = <strong>Fädelreihenfolge</strong> ist die genaue Reihenfolge zum Auffädeln der Perlen (<code>12\u00d7</code> bedeutet "12 Perlen dieses Typs in Folge auffädeln"). Wenn die Sequenz periodisch ist, zeigt die Seite eine <em>kompakte</em> Form \u2014 den Grundblock plus Anzahl der Wiederholungen \u2014 statt der gesamten Liste. Verwenden Sie den Umschalter, um zwischen kompakt und vollständig zu wechseln. Spalten teilt lange Fädellisten auf die Seitenbreite auf.
print.about.print = Klicken Sie auf <strong>Drucken\u2026</strong>, um diesen Bericht an Ihren Drucker zu senden. Farben bleiben im Druck erhalten.
