print.role.finisher = Cierre (hacer una vez)
print.role.doonce = Hacer una vez
print.role.group = Grupo

# Resumen del encabezado de la vista compacta. Args: secciones#, sección/secciones, bloques#, bloque/bloques, series#, totalCuentas
print.compress.summary = Comprimido en {0} {1}, {2} {3} distintos. {4} series, {5} cuentas en total. Los números hacen referencia a la tabla de cuentas anterior. Las series de cada bloque se muestran la primera vez que aparece; las referencias posteriores citan solo la letra del bloque.

# Resumen de grupo de series fuera de bloque. Args: título del rol, series#, serie/series, cuentas#, cuenta/cuentas
print.group.summary = {0} \u2014 {1} {2}, {3} {4}

# Encabezado de bloque — se representa como MarkupString (chip HTML). Args: letra identificadora, número de repeticiones
print.block.title = Bloque <span class="block-chip">{0}</span> \u00d7 <strong>{1}</strong>

# Metadatos del bloque entre paréntesis junto al encabezado. Args: series#, serie/series, cuentas#, cuenta/cuentas
print.block.meta = ({0} {1} por bloque, {2} {3} en total)
print.block.meta.recall = ({0} {1} por bloque, {2} {3} en total \u2014 ver definición más arriba)

# Nota de la sección Imágenes
print.images.note = Patrón = vista plana de diseño. Simulación = mitad frontal de la cuerda de cuentas con el desplazamiento de punto ladrillo. Las viñetas comparten una fila y se reducen para encajar; usa el control de altura de imagen de arriba para cambiar su altura máxima.

# Resumen del orden de enhebrado (se permite HTML)
print.numbers.hint = Los números de la columna <strong>#</strong> se referencian desde el <em>Orden de enhebrado</em> de abajo \u2014 p. ej. <code>12\u00d7 #3</code> significa enhebrar 12 cuentas del tipo listado en la fila #3.

# Resumen de secuencia periódica: ensamblado a partir de cláusulas separadas para que las
# traducciones puedan reordenar (el código C# solo las concatena con «+» entre ellas).
print.seq.periodic = La secuencia es periódica:
print.seq.opening = {0} {1} de inicio{2}
print.seq.block = {0}\u00d7 bloque de {1} {2}
print.seq.trailing = {0} {1} finales{2}
print.seq.reference = Los números hacen referencia a la tabla de cuentas anterior.

# Etiquetas de bloque para la forma compacta
print.block.startwith = Empieza con estas {0} {1} de inicio{2}:
print.block.repeat = Repite este bloque <strong>{0}\u00d7</strong> ({1} {2}{3}):
print.block.thenrepeat = Luego repite este bloque <strong>{0}\u00d7</strong> ({1} {2}{3}):
print.block.finishwith = Después termina con {0} {1} finales{2}:

# Resumen de series de la lista completa
print.runs.summary = Cada entrada es una serie de cuentas idénticas para enhebrar en secuencia \u2014 se incluyen las series de fondo. Los números hacen referencia a la tabla de cuentas anterior. {0} series, {1} cuentas en total.
print.runs.repeats.info = (El patrón se repite cada {0} {1}{2}.)

# Viñetas de Acerca de esta página (se permite HTML)
print.about.pattern = <strong>Patrón</strong> resume el diseño: circunferencia (cuentas por fila), número de filas usadas, un ciclo de repetición de color y el total de cuentas que necesitas para todo el patrón \u2014 <em>incluido</em> el fondo.
print.about.patternimage = <strong>Imagen del patrón</strong> es una representación escalable del diseño; usa el selector de tamaño para ajustarla al tamaño del papel en el que imprimes.
print.about.beads = <strong>Cuentas para enhebrar</strong> es tu lista de compra / preparación: cuántas de cada cuenta distinta debes preparar. Cada fila muestra el color, el fabricante, el nombre/ID y el acabado.
print.about.threading = <strong>Orden de enhebrado</strong> es la secuencia exacta para enhebrar las cuentas en el hilo (<code>12\u00d7</code> significa «enhebrar 12 de esta cuenta seguidas»). Si la secuencia es periódica, la página muestra una forma <em>compacta</em> \u2014 el bloque base más el número de repeticiones \u2014 en lugar de la lista completa. Usa el conmutador para cambiar entre compacto y completo. Columnas divide las listas largas de enhebrado a lo ancho de la página.
print.about.print = Pulsa <strong>Imprimir\u2026</strong> para enviar este informe a tu impresora. Los colores se conservan en la salida impresa.
