infoaboutdialog.title = Acerca de jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  Esto es <b>jbead</b>, un programa diseñado para ayudarte<br>\
  a diseñar cuerdas de crochet con cuentas. La creación de<br>\
  estas cuerdas se describe, por ejemplo, en el libro 'Bead<br>\
  Crochet Jewelry' escrito por Bert Rachel Freed y Dana<br>\
  Elizabeth Freed. Es un trabajo arduo crear una cuerda<br>\
  así, pero el resultado es muy hermoso.<br>\
  <br>\
  Con <b>jbead</b> puedes simular cómo quedará tu diseño<br>\
  antes de empezar a trabajar en él. Puedes ajustar tu<br>\
  diseño y, finalmente, imprimir todos los datos relevantes,<br>\
  incluida la imprescindible 'lista de cuentas', que te indica<br>\
  cómo disponer correctamente las cuentas en el hilo.<br>\
  <br>\
  <b>jbead</b> fue escrito por Damian Brunold. Está disponible<br>\
  gratuitamente y con licencia GPL v3. Esto significa que puedes<br>\
  usarlo y copiarlo libremente y crear obras derivadas. Damian<br>\
  Brunold no asume ninguna responsabilidad por errores o daños<br>\
  causados por el uso del programa. Debes decidir por ti mismo<br>\
  si el programa te resulta útil o no.<br>\
  <br> \
  Hay más información disponible en www.jbead.ch, donde también<br>\
  puedes dejar solicitudes de nuevas funciones y reportes de<br>\
  errores.<br>\
  <br>\
  ¡Diviértete usando <b>jbead</b>!<br>

