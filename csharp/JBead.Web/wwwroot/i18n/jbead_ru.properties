print.about.pattern = <strong>Узор</strong> обобщает дизайн: окружность (бисерин в ряду), количество использованных рядов, один цикл повтора цветов и общее количество бисерин, необходимое для всего узора \u2014 <em>включая</em> фон.
print.about.patternimage = <strong>Изображение узора</strong> \u2014 масштабируемая отрисовка дизайна; используйте выбор размера, чтобы подобрать нужный формат бумаги для печати.
print.about.beads = <strong>Бисерины для нанизывания</strong> \u2014 это ваш список для покупки / подготовки: сколько бисерин каждого вида нужно подготовить. В каждой строке показаны цвет, производитель, название/ID и покрытие.
print.about.threading = <strong>Порядок низания</strong> \u2014 точная последовательность нанизывания бисерин на нить (<code>12\u00d7</code> означает «нанизать 12 таких бисерин подряд»). Если последовательность периодична, страница показывает <em>компактную</em> форму \u2014 базовый блок плюс количество повторов \u2014 вместо полного списка. Используйте переключатель, чтобы переключаться между компактной и полной формами. Столбцы разделяют длинные списки низания по ширине страницы.
print.about.print = Нажмите <strong>Печать\u2026</strong>, чтобы отправить этот отчёт на принтер. Цвета сохраняются при печати.
