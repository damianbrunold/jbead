infoaboutdialog.title = О программе jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  Это <b>jbead</b>, программа, созданная, чтобы помочь вам проектировать<br>\
  бисерные жгуты. Создание таких жгутов описано,<br>\
  например, в книге 'Bead Crochet Jewelry', написанной Берт<br>\
  Рэйчел Фрид и Даной Элизабет Фрид. Создание такого жгута \u2014<br>\
  тяжёлая работа, но результат очень красив.<br>\
  <br>\
  С <b>jbead</b> вы можете смоделировать, как будет выглядеть ваш<br>\
  проект, прежде чем начать над ним работать. Вы можете доработать<br>\
  свой проект и, наконец, распечатать все важные данные,<br>\
  включая необходимый 'список бисерин', который подскажет вам,<br>\
  как правильно разместить бисерины на нити.<br>\
  <br>\
  <b>jbead</b> написан Дамианом Брунольдом. Он свободно<br>\
  доступен и лицензирован по GPL v3. Это означает, что вы<br>\
  можете свободно использовать и копировать его, а также<br>\
  создавать производные работы. Дамиан Брунольд не несёт<br>\
  ответственности за ошибки и ущерб, вызванные использованием<br>\
  программы. Вы должны сами решить, полезна ли вам<br>\
  программа или нет.<br>\
  <br> \
  Больше информации доступно на www.jbead.ch, там же<br>\
  вы можете оставлять пожелания функций и сообщения об ошибках.<br>\
  <br>\
  Приятного использования <b>jbead</b>!<br>

