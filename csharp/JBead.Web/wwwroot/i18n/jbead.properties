# Compact-view header summary. Args: sections#, section/sections, blocks#, block/blocks, runs#, beadsTotal
print.compress.summary = Compressed into {0} {1}, {2} distinct {3}. {4} runs, {5} beads total. Numbers reference the bead table above. Each block's runs are shown the first time it appears; later references cite only the block's letter.

# Non-block run group summary. Args: role title, runs#, run/runs, beads#, bead/beads
print.group.summary = {0} \u2014 {1} {2}, {3} {4}

# Block header — rendered as MarkupString (HTML chip). Args: letter label, repeat count
print.block.title = Block <span class="block-chip">{0}</span> \u00d7 <strong>{1}</strong>

# Block metadata in parentheses next to the header. Args: runs#, run/runs, beads#, bead/beads
print.block.meta = ({0} {1} per block, {2} {3} total)
print.block.meta.recall = ({0} {1} per block, {2} {3} total \u2014 see definition above)

# Images section note
print.images.note = Pattern = flat drafting view. Simulation = front half of the beaded rope with the brick-stitch offset. Tiles share a row and shrink to fit; use the image-height control above to change their maximum height.

# Threading order summary (HTML allowed)
print.numbers.hint = Numbers in the <strong>#</strong> column are referenced from the <em>Threading order</em> below \u2014 e.g. <code>12\u00d7 #3</code> means string 12 beads of the bead listed on row #3.

# Periodic-sequence summary: assembled from separate clauses so translations can
# reorder (C# code only concatenates with "+" between them).
print.seq.periodic = Sequence is periodic:
print.seq.opening = {0} opening {1}{2}
print.seq.block = {0}\u00d7 block of {1} {2}
print.seq.trailing = {0} trailing {1}{2}
print.seq.reference = Numbers reference the bead table above.

# Compact-form block labels
print.block.startwith = Start with these {0} opening {1}{2}:
print.block.repeat = Repeat this block <strong>{0}\u00d7</strong> ({1} {2}{3}):
print.block.thenrepeat = Then repeat this block <strong>{0}\u00d7</strong> ({1} {2}{3}):
print.block.finishwith = Then finish with {0} final {1}{2}:

# Full-list runs summary
print.runs.summary = Each entry is a run of identical beads to string in sequence \u2014 background runs are included. Numbers reference the bead table above. {0} runs, {1} beads total.
print.runs.repeats.info = (Pattern repeats every {0} {1}{2}.)

# About-this-page bullet points (HTML allowed)
print.about.pattern = <strong>Pattern</strong> summarises the design: circumference (beads per row), number of used rows, one color-repeat cycle, and the total beads you need for the whole pattern \u2014 <em>including</em> the background.
print.about.patternimage = <strong>Pattern image</strong> is a scalable rendering of the design; use the size picker to match the paper size you're printing on.
print.about.beads = <strong>Beads to add to the string</strong> is your shopping / prep list: how many of each distinct bead to prepare. Each row shows color, manufacturer, name/ID, and finish.
print.about.threading = <strong>Threading order</strong> is the exact sequence to string beads onto the thread (<code>12\u00d7</code> means "string 12 of this bead in a row"). If the sequence is periodic, the page shows a <em>compact</em> form \u2014 the base block plus the number of repeats \u2014 instead of the whole list. Use the toggle to switch between compact and full. Columns splits long threading lists across the page width.
print.about.print = Hit <strong>Print\u2026</strong> to send this report to your printer. Colours are preserved in print output.
