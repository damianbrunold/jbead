infoaboutdialog.title = O programie jbead
infoaboutdialog.text = <html><h2>jbead VERSION</h2><br>\
  To jest <b>jbead</b>, program zaprojektowany, aby pomóc Ci tworzyć<br>\
  sznury koralikowe szydełkowe. Tworzenie takich sznurów jest opisane<br>\
  np. w książce 'Bead Crochet Jewelry' autorstwa Bert Rachel Freed<br>\
  i Dany Elizabeth Freed. Stworzenie takiego sznura to ciężka praca,<br>\
  ale rezultat jest bardzo piękny.<br>\
  <br>\
  Z <b>jbead</b> możesz zasymulować jak będzie wyglądał Twój projekt<br>\
  przed rozpoczęciem pracy nad nim. Możesz dopracować swój projekt<br>\
  i na koniec wydrukować wszystkie istotne dane, w tym niezbędną<br>\
  'listę koralików', która mówi Ci, jak prawidłowo rozmieścić<br>\
  koraliki na nitce.<br>\
  <br>\
  <b>jbead</b> został napisany przez Damiana Brunolda. Jest darmowo<br>\
  dostępny na licencji GPL v3. Oznacza to, że możesz go swobodnie<br>\
  używać i kopiować oraz tworzyć prace pochodne. Damian Brunold<br>\
  nie ponosi odpowiedzialności za błędy i szkody spowodowane<br>\
  używaniem programu. Musisz sam zdecydować, czy program<br>\
  jest dla Ciebie użyteczny czy nie.<br>\
  <br> \
  Więcej informacji dostępnych jest na www.jbead.ch i tam<br>\
  możesz również zgłaszać prośby o funkcje i raporty o błędach.<br>\
  <br>\
  Miłej zabawy z <b>jbead</b>!<br>

